<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>B-Roll Auto Editor</title>
  <link rel="stylesheet" href="/static/style.css">
</head>

<body>
  <div class="app">
    <h1>B-Roll Auto Editor</h1>

    <section class="card">
      <h2>Library</h2>
      <div class="row">
        <input id="libraryFolder" type="text" placeholder="/Users/me/BRoll" value="{{ settings.library_folder }}">
        <button id="saveFolder">Save</button>
        <button id="scanBtn">Scan &amp; Analyze</button>
      </div>
      <p id="libraryStatus">—</p>
      <pre id="libraryLog" class="log"></pre>
    </section>

    <section class="card">
      <h2>New Project</h2>
      <label for="script">Script</label>
      <textarea id="script" rows="6" placeholder="Paste your script here..."></textarea>

      <label for="audio">Voiceover audio</label>
      <input id="audio" type="file" accept="audio/*">

      <button id="generateBtn">Generate Video</button>

      <pre id="genLog" class="log"></pre>
      <div id="result"></div>
    </section>

    <section class="card">
      <h2>Settings</h2>
      <label for="model">Gemini model</label>
      <select id="model">
        <option value="gemini-2.5-flash" {{ "selected" if settings.gemini_model=="gemini-2.5-flash" else "" }}>
          gemini-2.5-flash</option>
        <option value="gemini-3.1-flash-lite" {{ "selected" if settings.gemini_model=="gemini-3.1-flash-lite" else ""
          }}>gemini-3.1-flash-lite</option>
      </select>

      <label for="threshold">Match threshold (%)</label>
      <input id="threshold" type="number" min="0" max="100" value="{{ settings.match_threshold }}">

      <button id="saveSettings">Save Settings</button>
    </section>
  </div>
  <script src="/static/app.js"></script>
</body>

</html>
